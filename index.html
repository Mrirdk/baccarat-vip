<!DOCTYPE html>
<html lang="vi">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baccarat AI Pro - SX & DG Formula</title>
    <meta name="theme-color" content="#020617">
    
    <style>
        :root {
            --gold: linear-gradient(135deg, #fbbf24, #d97706);
            --glass-bg: rgba(10, 15, 30, 0.95);
            --glass-border: 1px solid rgba(0, 246, 255, 0.3);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 10px; padding-top: 40px; padding-bottom: 30px;
            min-height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column;
            background: #020617; color: #e2e8f0; user-select: none; -webkit-user-select: none;
        }

        .top-bar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,1); border-bottom: 1px solid #00f6ff; display: flex; justify-content: space-between; padding: 8px 15px; box-sizing: border-box; z-index: 1000; font-family: monospace; font-size: 11px; color: #00f6ff;}

        .glass-panel { background: var(--glass-bg); border: var(--glass-border); border-radius: 8px; padding: 15px; width: 100%; max-width: 620px; box-sizing: border-box; z-index: 2;}

        .screen { display: none; } .active-screen { display: block; }

        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 4px; border: 1px solid rgba(0,246,255,0.3); background: #000; color: #00f6ff; font-size: 16px; font-weight: bold; box-sizing: border-box; text-align: center;}
        
        .btn-main { width: 100%; padding: 15px; font-size: 16px; font-weight: 900; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; text-transform: uppercase; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: #000; } 
        .btn-blue { background: #00f6ff; color: #000; }
        .btn-outline { background: transparent; border: 2px solid #00f6ff; color: #00f6ff; }

        .sanh-container { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .sanh-box { width: 160px; height: 180px; border: 2px solid rgba(0, 246, 255, 0.3); border-radius: 8px; cursor: pointer; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); transition: 0.4s; }
        .sanh-box.active { border-color: #00f6ff; background: rgba(0, 246, 255, 0.1); }
        .sanh-name { position: absolute; bottom: 15px; left: 0; width: 100%; text-align: center; font-weight: 900; color: #00f6ff; font-size: 16px; text-shadow: 0 0 10px rgba(0,246,255,0.5);}
        .sanh-icon { font-size: 50px; transform: translateY(-10px); }

        .game-container { display: flex; flex-direction: column; gap: 10px; }

        .p-b-container { display: flex; gap: 10px; }
        .panel { flex: 1; padding: 10px; border-radius: 4px; background: rgba(0,0,0,0.8); border: 1px solid #334155; }
        .title { font-weight: 900; font-size: 14px; padding: 8px; text-align: center; border-radius: 4px; margin-bottom: 10px; }
        .title-1 { background: #0284c7; color: white; }
        .title-2 { background: #be123c; color: white; }
        .title-3 { background: #fbbf24; color: black; }

        .numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .num-btn { padding: 10px 0; font-size: 18px; font-weight: 900; background: #1e293b; border: 1px solid #475569; border-radius: 4px; color: #fff; cursor: pointer;}
        .num-1.active { background: #0ea5e9; border-color: #38bdf8; }
        .num-2.active { background: #e11d48; border-color: #fb7185; }
        .num-3.active { background: #fbbf24; color: #000; border-color: #f59e0b; }

        .action-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px;}
        .chot-btn { flex: 1; background: var(--gold); color: #000; font-size: 18px; font-weight: 900; padding: 15px; border: none; border-radius: 4px; cursor: pointer; }
        .chot-btn:disabled { background: #475569; color: #94a3b8; }
        
        /* GIAO DIỆN CHAT TELEGRAM */
        .chat-wrapper { background: #E5E5EA; padding: 15px; border-radius: 8px; height: 260px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-top: 5px;}
        
        .chat-bubble {
            background: #FFFFFF; color: #000; padding: 12px 15px; border-radius: 15px 15px 15px 4px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            font-size: 14px; line-height: 1.5; max-width: 90%; align-self: flex-start;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            position: relative; padding-bottom: 20px;
        }
        
        .chat-bubble-user {
            background: #DCF8C6; align-self: flex-end; border-radius: 15px 15px 4px 15px;
            font-weight: bold;
        }

        .chat-header { color: #1e293b; font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 5px;}
        .chat-time { font-size: 10px; color: #94a3b8; position: absolute; bottom: 5px; right: 10px; }

        .loader { width: 20px; height: 20px; border: 3px solid #cbd5e1; border-bottom-color: #0ea5e9; border-radius: 50%; display: inline-block; animation: rotation 0.8s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .cyber-alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; pointer-events: none; transition: 0.3s; }
        .cyber-alert-overlay.show { opacity: 1; pointer-events: all; }
        .cyber-alert-box { background: #000; border: 2px solid #00f6ff; border-radius: 4px; padding: 25px; text-align: center; max-width: 400px; width: 90%; }
        .cyber-alert-box h3 { color: #00f6ff; margin-top: 0;}
        .cyber-alert-box p { color: #e2e8f0; font-size: 16px; line-height: 1.5; }
        .cyber-alert-box button { background: #00f6ff; color: #000; border: none; padding: 10px 30px; border-radius: 4px; font-weight: 900; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div><span class="ssl-badge">🤖 BOT DỰ ĐOÁN SX & DG</span></div>
        <div class="battery" id="sysTime">00:00</div>
    </div>

    <div class="glass-panel">
        <div id="screen-auth" class="screen active-screen">
            <h2 style="text-align: center; color: #00f6ff; margin-bottom: 25px;">[ KẾT NỐI MÁY CHỦ ]</h2>
            <input type="text" id="username" placeholder="Nhập ID Định Danh...">
            <input type="password" id="activationCode" placeholder="Nhập Mã Kích Hoạt...">
            <button class="btn-main btn-blue" onclick="login()">ĐĂNG NHẬP TOOL</button>
        </div>

        <div id="screen-lobby" class="screen">
            <h3 style="color: #00f6ff; text-align: center; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-top: 0;">CHỌN MÁY CHỦ THUẬT TOÁN:</h3>
            <div class="sanh-container">
                <div class="sanh-box" id="sanh-sexy" onclick="selectSanh('Sexy')">
                    <div class="sanh-icon">💠</div>
                    <div class="sanh-name">SẢNH SEXY<br><span style="font-size:11px; font-weight:normal;">(Tính theo Hệ Số Ẩn)</span></div>
                </div>
                <div class="sanh-box" id="sanh-dg" onclick="selectSanh('DG')">
                    <div class="sanh-icon">👑</div>
                    <div class="sanh-name">SẢNH DG<br><span style="font-size:11px; font-weight:normal;">(Tính theo Cầu Phụ)</span></div>
                </div>
            </div>
            <button class="btn-main" style="background: transparent; border: 1px solid #ef4444; color: #ef4444; margin-top: 30px;" onclick="logout()">NGẮT KẾT NỐI</button>
        </div>

        <div id="screen-game" class="screen">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <button onclick="backToLobby()" style="background: transparent; color: #00f6ff; border: 1px solid #00f6ff; padding: 6px 12px; cursor: pointer; border-radius: 4px;">⬅ ĐỔI SẢNH</button>
                <span id="current-table-name" style="color: #fbbf24; font-weight: 900; font-size: 16px;">SẢNH VIP</span>
            </div>

            <div class="game-container">
                <div class="p-b-container">
                    <div class="panel">
                        <div class="title title-1" id="lbl-1">ĐIỂM CON</div>
                        <div class="numpad" id="numpad-1"></div>
                    </div>
                    <div class="panel">
                        <div class="title title-2" id="lbl-2">ĐIỂM CÁI</div>
                        <div class="numpad" id="numpad-2"></div>
                    </div>
                </div>
                
                <div class="panel" style="margin-top: -5px;">
                    <div class="title title-3" id="lbl-3">HỆ SỐ ẨN</div>
                    <div class="numpad" id="numpad-3" style="grid-template-columns: repeat(11, 1fr);"></div>
                </div>

                <div class="action-row">
                    <button class="chot-btn" id="btnAnalyze" onclick="calculate()">GỬI LỆNH DỰ ĐOÁN</button>
                </div>

                <div class="chat-wrapper" id="chatArea">
                    <div class="chat-bubble">
                        <div class="chat-header">🤖 Tool Dự Đoán VIP</div>
                        Hệ thống Công Thức Chuẩn đã kích hoạt. Vui lòng nhập dữ liệu theo đúng sảnh để bot tính toán.
                        <div class="chat-time" id="time-init">08:30</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="cyberAlert" class="cyber-alert-overlay"><div class="cyber-alert-box"><h3 id="alertTitle">LỖI</h3><p id="alertMsg"></p><button onclick="document.getElementById('cyberAlert').classList.remove('show')">ĐÓNG</button></div></div>

    <script>
        const MASTER_KEY = "VIP888"; 
        const BOT_TOKEN = '8724628711:AAFi8LB19_yDAxJnwPtVbHQPIcLbZ-mhaFg'; 
        const CHAT_ID = '8583745893'; 
        
        let s_eed = Date.now(); function getNum() { s_eed = (s_eed * 9301 + 49297) % 233280; return s_eed / 233280; }

        setInterval(() => { 
            let d = new Date(); 
            let timeStr = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
            document.getElementById('sysTime').innerText = timeStr; 
        }, 1000);
        document.getElementById('time-init').innerText = new Date().getHours().toString().padStart(2, '0') + ':' + new Date().getMinutes().toString().padStart(2, '0');

        function showCyberAlert(title, msg) { document.getElementById('alertTitle').innerText = title; document.getElementById('alertMsg').innerHTML = msg.replace(/\n/g, '<br>'); document.getElementById('cyberAlert').classList.add('show'); }

        function login() { 
            let c = document.getElementById('activationCode').value.trim(); 
            if(c !== MASTER_KEY) return showCyberAlert("TỪ CHỐI", "Mã kích hoạt sai!"); 
            document.getElementById('screen-auth').classList.remove('active-screen'); 
            document.getElementById('screen-lobby').classList.add('active-screen'); 
        }

        function logout() {
            document.getElementById('screen-lobby').classList.remove('active-screen'); 
            document.getElementById('screen-auth').classList.add('active-screen'); 
        }

        // --- ĐỔI GIAO DIỆN TÙY SẢNH SX/DG ---
        let currentSanh = '';
        function selectSanh(key) {
            currentSanh = key;
            if(key === 'Sexy') {
                document.getElementById('current-table-name').innerText = "THUẬT TOÁN SẢNH SEXY";
                document.getElementById('lbl-1').innerText = "ĐIỂM CON";
                document.getElementById('lbl-2').innerText = "ĐIỂM CÁI";
                document.getElementById('lbl-3').innerText = "HỆ SỐ ẨN (CẦU BỊ RỖNG)";
            } else if(key === 'DG') {
                document.getElementById('current-table-name').innerText = "THUẬT TOÁN SẢNH DG";
                document.getElementById('lbl-1').innerText = "CẦU PHỤ 1";
                document.getElementById('lbl-2').innerText = "CẦU PHỤ 2";
                document.getElementById('lbl-3').innerText = "CẦU PHỤ 3";
            }
            
            document.getElementById('screen-lobby').classList.remove('active-screen'); 
            document.getElementById('screen-game').classList.add('active-screen'); 
            resetUI();
        }

        function backToLobby() {
            document.getElementById('screen-game').classList.remove('active-screen'); 
            document.getElementById('screen-lobby').classList.add('active-screen'); 
        }

        // --- HỆ THỐNG NHẬP SỐ ---
        let val1 = -1, val2 = -1, val3 = -1;
        
        function createNumpad(s, maxNum) { 
            const cont = document.getElementById(`numpad-${s}`); 
            let arr = [1,2,3,4,5,6,7,8,9,0];
            if(maxNum === 10) arr = [1,2,3,4,5,6,7,8,9,0,10]; // Riêng khung 3 có thêm số 10

            arr.forEach(n => { 
                let btn = document.createElement('button'); btn.className = `num-btn num-${s}`; btn.innerText = n; 
                btn.onclick = () => { 
                    if(s===1) val1 = n; else if(s===2) val2 = n; else val3 = n;
                    Array.from(cont.children).forEach(c => c.classList.remove('active')); btn.classList.add('active'); 
                }; 
                cont.appendChild(btn); 
            }); 
        }
        createNumpad(1, 9); createNumpad(2, 9); createNumpad(3, 10);
        
        function resetUI() { 
            val1=-1; val2=-1; val3=-1;
            document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active')); 
        }

        // --- LÕI TÍNH TOÁN THEO TÀI LIỆU CHUẨN ---
        function calculate() {
            if(val1 === -1 || val2 === -1 || val3 === -1) return showCyberAlert("THIẾU DỮ LIỆU", "Vui lòng nhập đầy đủ 3 thông số!");
            
            let btn = document.getElementById('btnAnalyze'); 
            let chatArea = document.getElementById('chatArea');
            btn.disabled = true; btn.innerText = "ĐANG XỬ LÝ..."; 
            
            let d = new Date(); let timeStr = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');

            let userStr = currentSanh === 'Sexy' ? `Con: ${val1} | Cái: ${val2} | Ẩn: ${val3}` : `Cầu phụ: ${val1} | ${val2} | ${val3}`;
            let userMsg = document.createElement('div');
            userMsg.className = 'chat-bubble chat-bubble-user';
            userMsg.innerHTML = `${userStr}<div class="chat-time">${timeStr}</div>`;
            chatArea.appendChild(userMsg);

            let typingMsg = document.createElement('div');
            typingMsg.className = 'chat-bubble';
            typingMsg.innerHTML = `<div class="loader"></div>`;
            chatArea.appendChild(typingMsg);
            chatArea.scrollTop = chatArea.scrollHeight;

            setTimeout(() => {
                chatArea.removeChild(typingMsg);

                let totalS = val1 + val2 + val3;
                let unit = totalS % 10; 
                let pred = ''; let resultText = ''; let specialRule = '';

                // PHÂN NHÁNH THUẬT TOÁN THEO SẢNH
                if(currentSanh === 'Sexy') {
                    // SẢNH SX: Lấy hàng đơn vị. <6 Con, >6 Cái, =6 Hòa.
                    if (unit < 6) { pred = 'CON'; resultText = `Đơn vị = ${unit} (< 6) => <b>ĐÁNH CON</b>`; } 
                    else if (unit > 6) { pred = 'CÁI'; resultText = `Đơn vị = ${unit} (> 6) => <b>ĐÁNH CÁI</b>`; } 
                    else { pred = 'HÒA'; resultText = `Đơn vị = ${unit} (= 6) => <b>BÁO HÒA</b>`; }
                } 
                else if(currentSanh === 'DG') {
                    // SẢNH DG: Đặc biệt cụm 9-7-4 và đuôi 5
                    if (val1 === 9 && val2 === 7 && val3 === 4) {
                        pred = 'CÁI'; resultText = `<b>[LỆNH VIP]</b> Bắt được cụm 9-7-4 => <b>ĐÁNH MẠNH CÁI</b>`;
                        specialRule = ' (Lệnh VIP 974)';
                    } else if (unit === 5) {
                        pred = 'CÙNG MÀU'; resultText = `<b>[LỆNH ĐẶC BIỆT]</b> Đuôi 5 => <b>ĐÁNH CÙNG MÀU TAY TRƯỚC</b>`;
                        specialRule = ' (Bắt đuôi 5)';
                    } else {
                        if (unit < 6) { pred = 'CON'; resultText = `Đơn vị = ${unit} (< 6) => <b>ĐÁNH CON</b>`; } 
                        else if (unit > 6) { pred = 'CÁI'; resultText = `Đơn vị = ${unit} (> 6) => <b>ĐÁNH CÁI</b>`; } 
                        else { pred = 'HÒA'; resultText = `Đơn vị = ${unit} (= 6) => <b>BÁO HÒA</b>`; }
                    }
                }

                // Tỉ lệ % Fake Fomo
                let pPct = 0, bPct = 0, tiePct = 0;
                if(pred === 'CON') { pPct = 78 + Math.floor(getNum()*12); bPct = 100 - pPct - 6; tiePct = 6; }
                else if(pred === 'CÁI') { bPct = 78 + Math.floor(getNum()*12); pPct = 100 - bPct - 6; tiePct = 6; }
                else if(pred === 'CÙNG MÀU') { pPct = 47; bPct = 47; tiePct = 6; }
                else { tiePct = 85 + Math.floor(getNum()*10); pPct = Math.floor((100-tiePct)/2); bPct = 100 - tiePct - pPct; }

                let botMsg = document.createElement('div');
                botMsg.className = 'chat-bubble';
                botMsg.innerHTML = `
                    <div class="chat-header">📊 TOOL DỰ ĐOÁN SẢNH ${currentSanh.toUpperCase()}</div>
                    <b>[ TÍNH TOÁN ]</b><br>
                    Tổng: ${val1} + ${val2} + ${val3} = ${totalS}<br>
                    ${resultText}<br>
                    ------------------------<br>
                    TỈ LỆ THẮNG ${specialRule}:<br>
                    HÒA: ${tiePct}%<br>
                    CON: ${pPct}%<br>
                    CÁI: ${bPct}%<br>
                    <div class="chat-time">${timeStr}</div>
                `;
                chatArea.appendChild(botMsg);
                chatArea.scrollTop = chatArea.scrollHeight;

                btn.disabled = false; btn.innerText = "GỬI LỆNH DỰ ĐOÁN"; 
                resetUI();
            }, 800); 
        }
    </script>
</body>
