<!DOCTYPE html>
<html lang="vi">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8ER01LCJ9V"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-8ER01LCJ9V');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baccarat AI Pro - Telegram Clone</title>
    <meta name="theme-color" content="#020617">
    
    <style>
        :root {
            --gold: linear-gradient(135deg, #fbbf24, #d97706);
            --glass-bg: rgba(10, 15, 30, 0.9);
            --glass-border: 1px solid rgba(0, 246, 255, 0.3);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 10px; padding-top: 40px; padding-bottom: 30px;
            min-height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column;
            background: #020617; color: #e2e8f0; user-select: none; -webkit-user-select: none;
        }

        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; pointer-events: none; }

        .top-bar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,1); border-bottom: 1px solid #00f6ff; display: flex; justify-content: space-between; padding: 8px 15px; box-sizing: border-box; z-index: 1000; font-family: monospace; font-size: 11px; color: #00f6ff;}

        .glass-panel { background: var(--glass-bg); border: var(--glass-border); border-radius: 8px; padding: 15px; width: 100%; max-width: 620px; box-sizing: border-box; z-index: 2;}

        .screen { display: none; } .active-screen { display: block; }

        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 4px; border: 1px solid rgba(0,246,255,0.3); background: #000; color: #00f6ff; font-size: 16px; font-weight: bold; box-sizing: border-box; text-align: center;}
        
        .btn-main { width: 100%; padding: 15px; font-size: 16px; font-weight: 900; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; text-transform: uppercase; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: #000; } 
        .btn-blue { background: #00f6ff; color: #000; }
        .btn-outline { background: transparent; border: 2px solid #00f6ff; color: #00f6ff; }

        .game-container { display: flex; flex-direction: column; gap: 10px; }

        .p-b-container { display: flex; gap: 10px; }
        .panel { flex: 1; padding: 10px; border-radius: 4px; background: rgba(0,0,0,0.8); border: 1px solid #334155; }
        .title { font-weight: 900; font-size: 16px; padding: 8px; text-align: center; border-radius: 4px; margin-bottom: 10px; }
        .title-p { background: #0284c7; color: white; }
        .title-b { background: #be123c; color: white; }

        .numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .num-btn { padding: 10px 0; font-size: 18px; font-weight: 900; background: #1e293b; border: 1px solid #475569; border-radius: 4px; color: #fff; cursor: pointer;}
        .num-p.active { background: #0ea5e9; border-color: #38bdf8; }
        .num-b.active { background: #e11d48; border-color: #fb7185; }

        .action-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px;}
        .chot-btn { flex: 1; background: var(--gold); color: #000; font-size: 18px; font-weight: 900; padding: 15px; border: none; border-radius: 4px; cursor: pointer; }
        
        /* GIAO DIỆN CHAT GIỐNG TELEGRAM */
        .chat-wrapper { background: #E5E5EA; padding: 15px; border-radius: 8px; min-height: 150px; display: flex; flex-direction: column; gap: 10px; margin-top: 10px;}
        
        .chat-bubble {
            background: #FFFFFF; color: #000; padding: 12px 15px; border-radius: 15px 15px 15px 4px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            font-size: 15px; line-height: 1.6; max-width: 90%; align-self: flex-start;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            position: relative;
        }
        
        /* Hiệu ứng bong bóng chat của user (gửi đi) */
        .chat-bubble-user {
            background: #DCF8C6; align-self: flex-end; border-radius: 15px 15px 4px 15px;
            font-weight: bold;
        }

        .chat-header { color: #1e293b; font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 5px;}
        .chat-time { font-size: 11px; color: #94a3b8; position: absolute; bottom: 5px; right: 10px; }

        .loader { width: 24px; height: 24px; border: 3px solid #cbd5e1; border-bottom-color: #0ea5e9; border-radius: 50%; display: inline-block; animation: rotation 0.8s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .cyber-alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; pointer-events: none; transition: 0.3s; }
        .cyber-alert-overlay.show { opacity: 1; pointer-events: all; }
        .cyber-alert-box { background: #000; border: 2px solid #00f6ff; border-radius: 4px; padding: 25px; text-align: center; max-width: 400px; width: 90%; }
        .cyber-alert-box h3 { color: #00f6ff; margin-top: 0;}
        .cyber-alert-box p { color: #e2e8f0; font-size: 16px; line-height: 1.5; }
        .cyber-alert-box button { background: #00f6ff; color: #000; border: none; padding: 10px 30px; border-radius: 4px; font-weight: 900; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="top-bar">
        <div><span class="ssl-badge">🤖 BOT DỰ ĐOÁN A.I</span></div>
        <div class="battery" id="sysTime">00:00</div>
    </div>

    <div class="glass-panel">
        <div id="screen-auth" class="screen active-screen">
            <h2 style="text-align: center; color: #00f6ff; margin-bottom: 25px;">[ KẾT NỐI MÁY CHỦ ]</h2>
            <input type="text" id="username" placeholder="Nhập ID...">
            <input type="password" id="activationCode" placeholder="Nhập Mã Kích Hoạt...">
            <button class="btn-main btn-blue" onclick="login()">ĐĂNG NHẬP TOOL</button>
        </div>

        <div id="screen-game" class="screen">
            <div class="game-container">
                
                <!-- BÀN PHÍM CHỌN NÚT 0-9 -->
                <div class="p-b-container">
                    <div class="panel">
                        <div class="title title-p">CON (PLAYER)</div>
                        <div class="numpad" id="numpad-p"></div>
                    </div>
                    <div class="panel">
                        <div class="title title-b">CÁI (BANKER)</div>
                        <div class="numpad" id="numpad-b"></div>
                    </div>
                </div>

                <div class="action-row">
                    <button class="chot-btn" id="btnAnalyze" onclick="calculate()">GỬI LỆNH DỰ ĐOÁN</button>
                </div>

                <!-- KHUNG CHAT GIẢ LẬP TELEGRAM -->
                <div class="chat-wrapper" id="chatArea">
                    <div class="chat-bubble">
                        <div class="chat-header">🤖 Tool Dự Đoán VIP</div>
                        Hệ thống đã sẵn sàng. Vui lòng nhập số nút của ván trước để xuất tỉ lệ ván tiếp theo.
                        <div class="chat-time" id="time-init">08:30</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="cyberAlert" class="cyber-alert-overlay"><div class="cyber-alert-box"><h3 id="alertTitle">LỖI</h3><p id="alertMsg"></p><button onclick="document.getElementById('cyberAlert').classList.remove('show')">ĐÓNG</button></div></div>

    <script>
        const MASTER_KEY = "VIP888"; 
        
        let s_eed = Date.now(); function getNum() { s_eed = (s_eed * 9301 + 49297) % 233280; return s_eed / 233280; }

        setInterval(() => { 
            let d = new Date(); 
            let timeStr = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
            document.getElementById('sysTime').innerText = timeStr; 
        }, 1000);
        
        document.getElementById('time-init').innerText = new Date().getHours().toString().padStart(2, '0') + ':' + new Date().getMinutes().toString().padStart(2, '0');

        function showCyberAlert(title, msg) { document.getElementById('alertTitle').innerText = title; document.getElementById('alertMsg').innerHTML = msg.replace(/\n/g, '<br>'); document.getElementById('cyberAlert').classList.add('show'); }

        function login() { 
            let c = document.getElementById('activationCode').value.trim(); 
            if(c !== MASTER_KEY) return showCyberAlert("TỪ CHỐI", "Mã kích hoạt sai!"); 
            document.getElementById('screen-auth').classList.remove('active-screen'); 
            document.getElementById('screen-game').classList.add('active-screen'); 
        }

        let pScore = -1, bScore = -1;
        
        function createNumpad(s) { 
            const cont = document.getElementById(`numpad-${s}`); 
            [1,2,3,4,5,6,7,8,9,0].forEach(n => { 
                let btn = document.createElement('button'); btn.className = `num-btn num-${s}`; btn.innerText = n; 
                btn.onclick = () => { 
                    if(s==='p') pScore = n; else bScore = n; 
                    Array.from(cont.children).forEach(c => c.classList.remove('active')); btn.classList.add('active'); 
                }; 
                cont.appendChild(btn); 
            }); 
        }
        createNumpad('p'); createNumpad('b');
        
        function resetUI() { 
            pScore=-1; bScore=-1; 
            document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active')); 
        }

        function calculate() {
            if(pScore === -1 || bScore === -1) return showCyberAlert("THIẾU DỮ LIỆU", "Cần nhập Đủ Nút cho 2 cửa!");
            
            let btn = document.getElementById('btnAnalyze'); 
            let chatArea = document.getElementById('chatArea');
            btn.disabled = true; btn.innerText = "ĐANG XỬ LÝ..."; 
            
            let d = new Date(); 
            let timeStr = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');

            // 1. Thêm tin nhắn của User
            let userMsg = document.createElement('div');
            userMsg.className = 'chat-bubble chat-bubble-user';
            userMsg.innerHTML = `Ván trước: Con ${pScore} - Cái ${bScore}<div class="chat-time">${timeStr}</div>`;
            chatArea.appendChild(userMsg);

            // 2. Thêm bong bóng Đang tải (Typing...)
            let typingMsg = document.createElement('div');
            typingMsg.className = 'chat-bubble';
            typingMsg.innerHTML = `<div class="loader"></div>`;
            chatArea.appendChild(typingMsg);
            
            // Cuộn xuống cuối
            chatArea.scrollTop = chatArea.scrollHeight;

            setTimeout(() => {
                // Xóa bong bóng typing
                chatArea.removeChild(typingMsg);

                // --- TOÁN HỌC CƠ SỐ CỦA SẾP ---
                let totalS = pScore + bScore;
                let lastDigit = totalS % 10;
                
                let base = 0;
                if(lastDigit >= 1 && lastDigit <= 3) base = 1;
                else if(lastDigit >= 4 && lastDigit <= 6) base = 2;
                else if(lastDigit >= 7 && lastDigit <= 9) base = 3;
                
                let finalTotal = totalS + base;
                let isEven = (finalTotal % 2 === 0);
                
                // Kết quả: Chẵn -> Con (P), Lẻ -> Cái (B)
                let pred = isEven ? 'P' : 'B'; 

                // --- TÍNH PHẦN TRĂM FAKE THEO KẾT QUẢ ---
                // Hòa luôn thấp (5% - 11%)
                let tiePct = Math.floor(getNum() * 7) + 5; 
                let remaining = 100 - tiePct;
                
                let pPct = 0; let bPct = 0;
                if (pred === 'P') {
                    // Nếu công thức chốt CON, cho CON chiếm 52% - 65% số còn lại
                    pPct = Math.floor(remaining * (0.52 + getNum() * 0.13));
                    bPct = remaining - pPct;
                } else {
                    // Nếu công thức chốt CÁI, cho CÁI chiếm 52% - 65% số còn lại
                    bPct = Math.floor(remaining * (0.52 + getNum() * 0.13));
                    pPct = remaining - bPct;
                }

                // Long bảo (Cao / Thấp)
                let longBao = getNum() > 0.5 ? "CAO" : "THẤP";

                // 3. Hiển thị tin nhắn trả về y hệt Telegram
                let botMsg = document.createElement('div');
                botMsg.className = 'chat-bubble';
                botMsg.innerHTML = `
                    <div class="chat-header">📊 TOOL DỰ ĐOÁN KẾT QUẢ SẢNH AE SEXY</div>
                    ------------------------<br>
                    HÒA: ${tiePct}%<br>
                    CON: ${pPct}%<br>
                    CÁI: ${bPct}%<br>
                    LONG BẢO: ${longBao}
                    <div class="chat-time">${timeStr}</div>
                `;
                chatArea.appendChild(botMsg);
                chatArea.scrollTop = chatArea.scrollHeight;

                btn.disabled = false; btn.innerText = "GỬI LỆNH DỰ ĐOÁN"; 
                resetUI();
            }, 1500); // Trễ 1.5s cho giống bot đang suy nghĩ
        }

        // BACKGROUND PARTICLES MỜ MỜ CHO NGẦU
        const ctx = document.getElementById('canvas-bg').getContext('2d'); document.getElementById('canvas-bg').width = window.innerWidth; document.getElementById('canvas-bg').height = window.innerHeight;
        class P { constructor() { this.x=getNum()*window.innerWidth; this.y=getNum()*window.innerHeight; this.s=getNum()*2+1; this.dx=getNum()*0.4-0.2; this.dy=getNum()*0.4-0.2; } draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fillStyle='#00f6ff';ctx.fill();} update(){if(this.x>window.innerWidth||this.x<0)this.dx*=-1;if(this.y>window.innerHeight||this.y<0)this.dy*=-1;this.x+=this.dx;this.y+=this.dy;this.draw();} }
        let pArr = []; for(let i=0;i<40;i++) pArr.push(new P());
        function anim() { requestAnimationFrame(anim); ctx.clearRect(0,0,window.innerWidth,window.innerHeight); pArr.forEach(p=>p.update()); }
        anim();
    </script>
</body>
</html>
