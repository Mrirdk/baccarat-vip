<!DOCTYPE html>
<html lang="vi">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8ER01LCJ9V"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-8ER01LCJ9V');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baccarat AI Pro - Real Combat</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/4712/4712035.png">
    
    <style>
        :root {
            --gold: linear-gradient(135deg, #fbbf24, #d97706);
            --glass-bg: rgba(10, 15, 30, 0.95);
            --glass-border: 1px solid rgba(0, 246, 255, 0.3);
        }
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 10px; padding-top: 40px; padding-bottom: 30px; min-height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; background: #020617; color: #e2e8f0; user-select: none; -webkit-user-select: none; }
        
        .top-bar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,1); border-bottom: 1px solid #00f6ff; display: flex; justify-content: space-between; padding: 8px 15px; box-sizing: border-box; z-index: 1000; font-family: monospace; font-size: 11px; color: #00f6ff; }
        
        .glass-panel { background: var(--glass-bg); border: var(--glass-border); border-radius: 8px; padding: 20px; width: 100%; max-width: 620px; box-sizing: border-box; z-index: 2; position: relative;}
        
        .header h1 { text-align: center; color: #fbbf24; font-size: 26px; font-weight: 900; margin: 0 0 20px 0; text-shadow: 0 0 10px rgba(251,191,36,0.5); }
        .screen { display: none; } .active-screen { display: block; }

        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 4px; border: 1px solid rgba(0,246,255,0.3); background: #000; color: #00f6ff; font-size: 16px; font-weight: bold; box-sizing: border-box; text-align: center; }
        .btn-main { width: 100%; padding: 16px; font-size: 16px; font-weight: 900; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; text-transform: uppercase; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: #000; } .btn-blue { background: #00f6ff; color: #000; }
        .btn-outline { background: transparent; border: 2px solid #00f6ff; color: #00f6ff; }

        /* HỆ THỐNG CHỌN BÀI THỰC CHIẾN */
        .card-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .card-side { flex: 1; background: rgba(0,0,0,0.8); border-radius: 8px; padding: 10px; border: 1px solid #334155; }
        .side-title { text-align: center; font-weight: 900; padding: 8px; border-radius: 4px; margin-bottom: 10px; }
        .title-p { background: #0284c7; color: white; border: 1px solid #38bdf8;} .title-b { background: #be123c; color: white; border: 1px solid #fb7185;}
        
        .card-slots { display: flex; justify-content: space-around; gap: 5px;}
        .slot { width: 45px; height: 65px; border: 2px dashed #475569; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 22px; font-weight: bold; color: #fff; cursor: pointer; background: #0f172a; }
        .slot.active { border-color: #fbbf24; background: rgba(251, 191, 36, 0.2); }
        .slot.filled { border-style: solid; background: #fff; color: #000; border-color: #fff; }

        /* BÀN PHÍM BÀI ĐỘ NẢY CAO */
        .keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 20px; background: rgba(0,0,0,0.9); padding: 12px; border-radius: 8px; border: 1px solid #334155; }
        .key-btn { padding: 15px 0; font-size: 18px; font-weight: 900; background: #1e293b; border: 1px solid #475569; border-radius: 4px; color: #fff; cursor: pointer; }
        .key-btn:active { background: #fbbf24; color: #000; transform: scale(0.95); }
        .key-action { grid-column: span 7; background: #ef4444; margin-top: 5px; border-color: #ef4444;} .key-action:active { background: #b91c1c; }

        .action-row { display: flex; gap: 15px; align-items: center; margin-bottom: 15px;}
        .chot-btn { flex: 1; background: var(--gold); color: #000; font-size: 18px; font-weight: 900; padding: 15px; border: none; border-radius: 4px; cursor: pointer; }
        .chot-btn:disabled { background: #475569; color: #94a3b8;}
        
        .res-wrapper { border-radius: 4px; background: #111; border: 1px solid #334155; padding: 4px; }
        .result-box { font-size: 40px; font-weight: 900; border-radius: 4px; background: #000; width: 70px; height: 60px; display: flex; justify-content: center; align-items: center; color: white; }
        
        .chat-box { background: #000; color: #10b981; padding: 15px; font-family: monospace; border-radius: 4px; min-height: 120px; font-size: 15px; border-left: 4px solid #00f6ff; border-right: 1px solid #334155; border-top: 1px solid #334155; border-bottom: 1px solid #334155; line-height: 1.5; white-space: pre-wrap;}
        
        .cyber-alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; pointer-events: none;}
        .cyber-alert-overlay.show { opacity: 1; pointer-events: all; }
        .cyber-alert-box { background: #000; border: 2px solid #00f6ff; border-radius: 4px; padding: 25px; text-align: center; max-width: 350px; width: 90%; }
        .cyber-alert-box h3 { color: #00f6ff; margin-top: 0; }
        .cyber-alert-box p { color: #e2e8f0; font-size: 15px; }
        .cyber-alert-box button { background: #00f6ff; color: #000; border: none; padding: 10px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div><span class="ssl-badge">🔒 COMBAT CORE ACTIVE</span></div>
        <div class="battery">PIN: TỐI ƯU</div>
    </div>

    <div class="glass-panel">
        <div class="header"><h1>DECODER THỰC CHIẾN</h1></div>

        <div id="screen-auth" class="screen active-screen">
            <input type="text" id="username" placeholder="Nhập ID Quản Trị Viên...">
            <input type="password" id="activationCode" placeholder="Nhập Mã Hệ Thống...">
            <button class="btn-main btn-blue" onclick="login()">MỞ KHÓA HỆ THỐNG</button>
            <button class="btn-main btn-outline" onclick="register()">BÁO CÁO KẾT NỐI</button>
        </div>

        <div id="screen-game" class="screen">
            <div style="text-align: center; margin-bottom: 15px; color: #fbbf24; font-weight: bold; font-size: 14px;">
                MÁY TÍNH CÔNG THỨC CƠ SỐ
            </div>

            <div class="card-container">
                <div class="card-side">
                    <div class="side-title title-p">CON (PLAYER)</div>
                    <div class="card-slots" id="slots-p">
                        <div class="slot active" id="p1" onclick="selectSlot('p', 1)">+</div>
                        <div class="slot" id="p2" onclick="selectSlot('p', 2)">+</div>
                        <div class="slot" id="p3" onclick="selectSlot('p', 3)">+</div>
                    </div>
                </div>
                <div class="card-side">
                    <div class="side-title title-b">CÁI (BANKER)</div>
                    <div class="card-slots" id="slots-b">
                        <div class="slot" id="b1" onclick="selectSlot('b', 1)">+</div>
                        <div class="slot" id="b2" onclick="selectSlot('b', 2)">+</div>
                        <div class="slot" id="b3" onclick="selectSlot('b', 3)">+</div>
                    </div>
                </div>
            </div>

            <div class="keyboard" id="cardKeyboard"></div>

            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="number" id="handNum" value="1" placeholder="Ván Số" style="margin:0; width: 80px;">
                <button class="chot-btn" id="btnAnalyze" onclick="calculate()">TÍNH KẾT QUẢ</button>
                <div class="res-wrapper"><div class="result-box" id="resultBox">?</div></div>
            </div>

            <div class="chat-box" id="chatBox">⚡ MÁY CHỦ SẴN SÀNG.<br>⚡ NHẬP LÁ BÀI TỪ SÒNG ĐỂ ÁP DỤNG CÔNG THỨC...</div>
        </div>
    </div>

    <div id="cyberAlert" class="cyber-alert-overlay">
        <div class="cyber-alert-box"><h3 id="alertTitle">Thông Báo</h3><p id="alertMsg"></p><button onclick="document.getElementById('cyberAlert').classList.remove('show')">ĐÓNG</button></div>
    </div>

    <script>
        const MASTER_KEY = "VIP888"; 
        const BOT_TOKEN = '8724628711:AAFi8LB19_yDAxJnwPtVbHQPIcLbZ-mhaFg'; 
        const CHAT_ID = '8583745893'; 

        function showAlert(t, m) { document.getElementById('alertTitle').innerText = t; document.getElementById('alertMsg').innerHTML = m.replace(/\n/g, '<br>'); document.getElementById('cyberAlert').classList.add('show'); }

        function login() { 
            let u = document.getElementById('username').value.trim(); let c = document.getElementById('activationCode').value.trim();
            if(u==="" || c==="") return showAlert("LỖI", "Vui lòng nhập đủ thông tin!"); 
            if(c !== MASTER_KEY) return showAlert("TỪ CHỐI", "Mã kích hoạt không đúng!"); 
            document.getElementById('screen-auth').classList.remove('active-screen'); document.getElementById('screen-game').classList.add('active-screen'); 
        }

        function register() { 
            let u = document.getElementById('username').value.trim(); if(u==="") return showAlert("LỖI", "Nhập ID để thao tác!"); 
            let text = `🚨 TRUY CẬP HỆ THỐNG THỰC CHIẾN 🚨\n👤 ID: ${u}\n⏰: ${new Date().toLocaleString('vi-VN')}`; 
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`).then(() => showAlert("THÀNH CÔNG", "Đã lưu vết truy cập lên máy chủ.")); 
        }

        // ==========================================
        // LÕI XỬ LÝ LÁ BÀI & CÔNG THỨC CƠ SỐ
        // ==========================================
        let currentSide = 'p'; let currentSlot = 1;
        let cards = { p: {1: null, 2: null, 3: null}, b: {1: null, 2: null, 3: null} };
        
        const deck = [
            {label: 'A', val: 1}, {label: '2', val: 2}, {label: '3', val: 3}, {label: '4', val: 4}, 
            {label: '5', val: 5}, {label: '6', val: 6}, {label: '7', val: 7}, {label: '8', val: 8}, 
            {label: '9', val: 9}, {label: '10', val: 0}, {label: 'J', val: 0}, {label: 'Q', val: 0}, {label: 'K', val: 0}
        ];

        const kb = document.getElementById('cardKeyboard');
        deck.forEach(c => {
            let btn = document.createElement('button'); btn.className = 'key-btn'; btn.innerText = c.label;
            btn.onclick = () => assignCard(c); kb.appendChild(btn);
        });
        let clearBtn = document.createElement('button'); clearBtn.className = 'key-btn key-action'; clearBtn.innerText = 'XÓA TRẮNG BÀN NHÁP';
        clearBtn.onclick = () => resetCards(); kb.appendChild(clearBtn);

        function selectSlot(side, slot) {
            currentSide = side; currentSlot = slot;
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById(`${side}${slot}`).classList.add('active');
        }

        function assignCard(cardObj) {
            cards[currentSide][currentSlot] = cardObj;
            let slotEl = document.getElementById(`${currentSide}${currentSlot}`);
            slotEl.innerText = cardObj.label; slotEl.classList.add('filled');
            
            // Tự động nhảy ô để thao tác siêu tốc ở sòng
            if(currentSlot < 3) { selectSlot(currentSide, currentSlot + 1); }
            else if(currentSide === 'p') { selectSlot('b', 1); }
        }

        function resetCards() {
            cards = { p: {1: null, 2: null, 3: null}, b: {1: null, 2: null, 3: null} };
            document.querySelectorAll('.slot').forEach(s => { s.innerText = '+'; s.classList.remove('filled', 'active'); });
            selectSlot('p', 1);
        }

        function getScore(side) {
            let total = 0; let count = 0;
            for(let i=1; i<=3; i++) { if(cards[side][i] !== null) { total += cards[side][i].val; count++; } }
            return count >= 2 ? (total % 10) : -1;
        }

        // CÔNG THỨC: 123->1, 456->2, 789->3, 0->0
        function getBase(score) {
            if(score >= 1 && score <= 3) return 1;
            if(score >= 4 && score <= 6) return 2;
            if(score >= 7 && score <= 9) return 3;
            return 0; 
        }

        function calculate() {
            let pScore = getScore('p'); let bScore = getScore('b');
            if(pScore === -1 || bScore === -1) return showAlert("THIẾU DỮ LIỆU", "Phải nhập chính xác ít nhất 2 lá bài cho cửa CON và CÁI!");
            
            let btn = document.getElementById('btnAnalyze'); let resB = document.getElementById('resultBox'); let cBox = document.getElementById('chatBox');
            btn.disabled = true; btn.innerText = "ĐANG TÍNH..."; 
            
            let hNum = parseInt(document.getElementById('handNum').value); 
            
            // LÕI TÍNH TOÁN CHÍNH XÁC YÊU CẦU CỦA SẾP
            let baseP = getBase(pScore);
            let baseB = getBase(bScore);
            
            // Lấy cơ số lớn nhất áp dụng
            let addedBase = Math.max(baseP, baseB);
            
            // Tổng hợp
            let totalScore = pScore + bScore + addedBase;
            let isEven = (totalScore % 2 === 0);
            
            // CHẴN -> CON, LẺ -> CÁI
            let pred = isEven ? 'P' : 'B'; 
            
            let msg = `[ KẾT QUẢ ĐỐI SOÁT CƠ SỐ ]\n------------------------\n- Điểm CON: ${pScore} nút\n- Điểm CÁI: ${bScore} nút\n- Cơ số áp dụng (Cao nhất): +${addedBase}\n\n[ PHÉP TÍNH ]\nTổng: ${pScore} + ${bScore} + ${addedBase} = ${totalScore} -> MÃ [ ${isEven?'CHẴN':'LẺ'} ]\n\n=> XUẤT LỆNH: ${pred==='P'?'CON (PLAYER)':'CÁI (BANKER)'}\n(Tỉ lệ công thức chỉ định: 80% - Cẩn trọng dòng tiền)`;
            
            resB.innerHTML = pred; 
            resB.style.color = '#fff'; 
            resB.style.backgroundColor = pred === 'B' ? '#be123c' : '#0284c7'; 
            
            cBox.innerHTML = msg; 
            document.getElementById('handNum').value = hNum + 1; 
            btn.disabled = false; btn.innerText = "TÍNH KẾT QUẢ VÁN TIẾP THEO"; 
            resetCards();
        }
    </script>
</body>
</html>
