<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baccarat AI Pro - Cyber Epic</title>
    <style>
        /* CYBERPUNK & LUXURY THEME */
        :root {
            --bg-gradient: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            --gold: linear-gradient(135deg, #fbbf24, #d97706);
            --gold-glow: 0 0 20px rgba(251, 191, 36, 0.4);
            --neon-blue: #00f6ff;
            --neon-blue-glow: 0 0 15px rgba(0, 246, 255, 0.5);
            --neon-red: #ff003c;
            --neon-red-glow: 0 0 15px rgba(255, 0, 60, 0.5);
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
        }

        body { 
            font-family: 'Montserrat', 'Segoe UI', sans-serif; 
            margin: 0; padding: 10px; 
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            background: var(--bg-gradient);
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: var(--glass-border);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.8);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Scanline effect for background */
        .glass-panel::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0) 100%);
            background-size: 100% 4px; z-index: 0; pointer-events: none; opacity: 0.3;
        }

        .header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 600px; padding: 15px; position: relative; z-index: 1;}
        .header h1 { 
            margin: 0; 
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px; font-weight: 900; letter-spacing: 2px;
            text-transform: uppercase;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5));
        }
        
        /* SCREENS & ANIMATIONS */
        .screen { display: none; width: 100%; max-width: 650px; box-sizing: border-box; animation: scaleUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); position: relative; z-index: 1;}
        .active-screen { display: block; }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        /* INPUTS */
        input, select { 
            width: 100%; padding: 16px; margin: 12px 0; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.6); color: #fff; font-size: 16px; box-sizing: border-box;
            transition: all 0.3s;
        }
        input:focus, select:focus { border-color: #fbbf24; outline: none; box-shadow: var(--gold-glow); }
        
        .btn-main { 
            width: 100%; padding: 16px; font-size: 16px; font-weight: 900; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .btn-gold { background: var(--gold); color: #000; box-shadow: 0 4px 15px rgba(217, 119, 6, 0.4); }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(251, 191, 36, 0.6); }
        .btn-blue { background: linear-gradient(135deg, #0ea5e9, #2563eb); color: #fff; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }

        /* LOBBY */
        .sanh-container { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .sanh-box {
            width: 160px; height: 180px;
            border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
            cursor: pointer; position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(180deg, rgba(30,41,59,0.8) 0%, rgba(15,23,42,0.9) 100%);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sanh-box:hover { border-color: #fbbf24; box-shadow: var(--gold-glow); transform: translateY(-8px); }
        .sanh-box.active { border-color: #fbbf24; background: linear-gradient(to bottom, rgba(251, 191, 36, 0.2), rgba(0, 0, 0, 0.8)); }
        .sanh-name { position: absolute; bottom: 15px; left: 0; width: 100%; text-align: center; font-weight: 900; color: #fbbf24; font-size: 15px; letter-spacing: 1px; }
        .sanh-icon { font-size: 45px; color: rgba(255, 255, 255, 0.9); transform: translateY(-10px); }

        /* TABLE SELECTION */
        .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 20px; }
        .ban-box {
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            padding: 18px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .ban-box:hover { border-color: #fbbf24; box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); transform: scale(1.05); }
        .ban-title { font-weight: 900; color: #fbbf24; font-size: 16px; margin-bottom: 10px; }
        .ban-win-rate { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
        .ban-win-rate strong { color: #10b981; font-size: 15px; }

        /* GAME AI INTERFACE */
        .game-container { display: flex; flex-direction: column; gap: 16px; }
        .panel { flex: 1; padding: 15px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); position: relative;}
        .panel-p { background: linear-gradient(180deg, rgba(14,165,233,0.15) 0%, rgba(0,0,0,0.6) 100%); border-top: 3px solid var(--neon-blue);}
        .panel-b { background: linear-gradient(180deg, rgba(225,29,72,0.15) 0%, rgba(0,0,0,0.6) 100%); border-top: 3px solid var(--neon-red);}
        .p-b-container { display: flex; gap: 16px; }

        .title { font-weight: 900; font-size: 18px; padding: 10px; text-align: center; border-radius: 8px; margin-bottom: 15px; letter-spacing: 1px;}
        .title-p { background: linear-gradient(90deg, #0284c7, #38bdf8); color: white; box-shadow: var(--neon-blue-glow);}
        .title-b { background: linear-gradient(90deg, #be123c, #fb7185); color: white; box-shadow: var(--neon-red-glow);}

        .btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
        .btn { padding: 12px 18px; font-weight: 900; border: 1px solid #334155; border-radius: 8px; cursor: pointer; color: #94a3b8; background: #0f172a; transition: all 0.2s; }
        .btn-p.active { background: #0ea5e9; color: #fff; border-color: #38bdf8; box-shadow: var(--neon-blue-glow); }
        .btn-b.active { background: #e11d48; color: #fff; border-color: #fb7185; box-shadow: var(--neon-red-glow); }
        
        .numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .num-btn { padding: 14px 0; font-size: 20px; font-weight: 900; background: rgba(255,255,255,0.03); border: 1px solid #334155; border-radius: 8px; color: #fff; cursor: pointer; transition: all 0.2s;}
        .num-p:hover, .num-b:hover { background: rgba(255,255,255,0.1); }
        .num-p.active { background: #0ea5e9; border-color: #38bdf8; box-shadow: var(--neon-blue-glow); }
        .num-b.active { background: #e11d48; border-color: #fb7185; box-shadow: var(--neon-red-glow); }

        .bottom-panel { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 16px; border: 1px solid #334155;}
        .input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 12px 16px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 1px solid #1e293b;}
        .input-row input { width: 70px; font-size: 24px; text-align: center; font-weight: 900; background: #000; color: #fbbf24; border: 1px solid #fbbf24; border-radius: 8px; margin:0;}
        
        .action-row { display: flex; gap: 16px; align-items: center; margin-bottom: 16px;}
        
        /* NÚT CHỐT LỆNH HOÀNH TRÁNG */
        .chot-btn { 
            flex: 1; background: var(--gold); color: #000; font-size: 20px; font-weight: 900; padding: 18px; 
            border: none; border-radius: 12px; cursor: pointer; 
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
            animation: pulseBtn 2s infinite;
        }
        @keyframes pulseBtn { 0% { box-shadow: 0 0 15px rgba(251,191,36,0.4); } 50% { box-shadow: 0 0 30px rgba(251,191,36,0.8); } 100% { box-shadow: 0 0 15px rgba(251,191,36,0.4); } }
        .chot-btn:active { transform: scale(0.96); }
        .chot-btn:disabled { background: #475569; color: #94a3b8; animation: none; box-shadow: none; cursor: not-allowed;}
        
        /* Ô KẾT QUẢ VÀ HIỆU ỨNG QUÉT */
        .result-box { 
            font-size: 50px; font-weight: 900; padding: 10px 25px; border-radius: 12px; 
            background: #000; min-width: 80px; text-align: center; border: 2px solid #334155; 
            display: flex; justify-content: center; align-items: center; height: 75px; box-sizing: border-box;
            transition: all 0.3s;
        }
        .loader {
            width: 35px; height: 35px; border: 4px solid #334155; border-bottom-color: #fbbf24;
            border-radius: 50%; display: inline-block; animation: rotation 0.8s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .chat-box { 
            background: #020617; color: #10b981; padding: 16px; font-family: 'Courier New', Courier, monospace; 
            border-radius: 10px; min-height: 90px; font-size: 15px; white-space: pre-wrap; 
            border-left: 4px solid #fbbf24; box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            line-height: 1.4;
        }
        .chat-scanning { color: #fbbf24; animation: blinker 0.6s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .rate { color: #fbbf24; font-weight: 900; font-size: 20px; text-align: center;}
    </style>
</head>
<body>

    <div class="header glass-panel">
        <h1>AI BACCARAT ĐỘC QUYỀN</h1>
    </div>

    <div id="screen-auth" class="screen active-screen glass-panel">
        <h2 style="text-align: center; color: #fbbf24; margin-bottom: 25px; letter-spacing: 1px;">CỔNG XÁC THỰC BẢO MẬT</h2>
        <input type="text" id="username" placeholder="Nhập ID Định Danh...">
        <button class="btn-main btn-blue" onclick="login()">ĐĂNG NHẬP HỆ THỐNG</button>
        <button class="btn-main btn-gold" style="margin-top: 15px;" onclick="register()">ĐĂNG KÝ CẤP QUYỀN VIP</button>
    </div>

    <div id="screen-lobby" class="screen glass-panel">
        <div style="text-align: center; margin-bottom: 25px;">
            <p style="color: #94a3b8; margin: 0; font-weight: bold; text-transform: uppercase;">Xin chào Nhà Đầu Tư,</p>
            <h2 id="welcome-user" style="color: #00f6ff; margin: 5px 0 0 0; font-size: 28px;">VIP_User</h2>
        </div>
        
        <h3 style="color: #fbbf24; border-bottom: 1px solid rgba(251, 191, 36, 0.2); padding-bottom: 12px; text-align: center; letter-spacing: 1px;">TRUY CẬP SẢNH DỮ LIỆU:</h3>
        
        <div class="sanh-container">
            <div class="sanh-box" id="sanh-sexy" onclick="selectSanh('Sexy')">
                <div class="sanh-icon">💠</div>
                <div class="sanh-name">SEXY CASINO</div>
            </div>
            <div class="sanh-box" id="sanh-wm" onclick="selectSanh('WM')">
                <div class="sanh-icon">👑</div>
                <div class="sanh-name">WM CASINO</div>
            </div>
        </div>

        <button class="btn-main" style="background: transparent; border: 1px solid #ef4444; color: #ef4444; margin-top: 30px;" onclick="logout()">ĐÓNG PHIÊN KẾT NỐI</button>
    </div>

    <div id="screen-table" class="screen glass-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button onclick="backToLobby()" style="background: rgba(255,255,255,0.05); color: #cbd5e1; border: 1px solid #475569; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold;">⬅ THOÁT</button>
            <h3 style="color: #fbbf24; margin: 0; font-weight: 900; letter-spacing: 1px;">CHỌN LUỒNG PHÂN TÍCH:</h3>
        </div>
        <div class="table-grid" id="table-grid"></div>
    </div>

    <div id="screen-game" class="screen glass-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <button onclick="backToTable()" style="background: rgba(255,255,255,0.05); color: #cbd5e1; border: 1px solid #475569; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold;">⬅ ĐỔI BÀN</button>
            <span id="current-table-name" style="color: #fbbf24; font-weight: 900; font-size: 18px; padding: 5px 15px; background: rgba(0,0,0,0.5); border-radius: 8px; border: 1px solid rgba(251,191,36,0.3);">BÀN VIP</span>
        </div>
        
        <div class="game-container">
            <div class="p-b-container">
                <div class="panel panel-p">
                    <div class="title title-p">CON (PLAYER)</div>
                    <div class="btn-group">
                        <button class="btn btn-p" id="p-2" onclick="setCards('p', 2)">2 LÁ</button>
                        <button class="btn btn-p" id="p-3" onclick="setCards('p', 3)">3 LÁ</button>
                    </div>
                    <div class="numpad" id="numpad-p"></div>
                </div>
                <div class="panel panel-b">
                    <div class="title title-b">CÁI (BANKER)</div>
                    <div class="btn-group">
                        <button class="btn btn-b" id="b-2" onclick="setCards('b', 2)">2 LÁ</button>
                        <button class="btn btn-b" id="b-3" onclick="setCards('b', 3)">3 LÁ</button>
                    </div>
                    <div class="numpad" id="numpad-b"></div>
                </div>
            </div>

            <div class="bottom-panel">
                <div class="input-row">
                    <div style="display: flex; align-items: center;">
                        <span style="font-weight: 900; color: #94a3b8; margin-right: 12px; font-size: 16px;">VÁN SỐ:</span>
                        <input type="number" id="handNum" value="1">
                    </div>
                    <span class="rate" id="winRate">TỈ LỆ: --%</span>
                </div>
                
                <div class="action-row">
                    <button class="chot-btn" id="btnAnalyze" onclick="calculate()">🚀 KÍCH HOẠT QUÉT AI</button>
                    <div class="result-box" id="resultBox">?</div>
                </div>
                
                <div class="chat-box" id="chatBox">⚡ KẾT NỐI API THÀNH CÔNG.\n⚡ SẴN SÀNG NHẬN DỮ LIỆU...</div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA & LOBBY LOGIC ---
        const sanhs = {
            'Sexy': { name: 'SEXY CASINO', rooms: ['C01', 'C02', 'C03', 'C04', 'C05', 'C06', 'C07', 'C08'] },
            'WM': { name: 'WM CASINO', rooms: ['C01', 'C02', 'C03', 'C04', 'C05', 'C06', 'C07', 'C08', 'C09', 'C10'] }
        };

        let currentSanh = '';
        let currentRoom = '';

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }

        function register() {
            let user = document.getElementById('username').value.trim();
            if(user === "") return alert("HỆ THỐNG: Nhập ID Định danh để yêu cầu cấp quyền!");
            alert(`✅ Đã mã hóa và gửi yêu cầu cấp quyền cho ID [ ${user} ] tới Quản Trị Viên.\nVui lòng đợi xét duyệt.`);
        }

        function login() {
            let user = document.getElementById('username').value.trim();
            if(user === "") return alert("HỆ THỐNG: Vui lòng nhập ID Định danh!");
            document.getElementById('welcome-user').innerText = user.toUpperCase();
            showScreen('screen-lobby');
        }

        function logout() {
            document.getElementById('username').value = "";
            showScreen('screen-auth');
        }

        function selectSanh(sanhKey) {
            currentSanh = sanhs[sanhKey];
            document.querySelectorAll('.sanh-box').forEach(b => b.classList.remove('active'));
            document.getElementById(`sanh-${sanhKey.toLowerCase()}`).classList.add('active');
            loadTables();
            showScreen('screen-table');
        }

        function loadTables() {
            let grid = document.getElementById('table-grid');
            grid.innerHTML = ''; 
            currentSanh.rooms.forEach(room => {
                let banBox = document.createElement('div');
                banBox.className = 'ban-box';
                let randomRate = Math.floor(Math.random() * (99 - 75 + 1)) + 75;
                banBox.innerHTML = `
                    <div class="ban-title">${currentSanh.name}<br><span style="color:#fff; font-size:18px;">${room}</span></div>
                    <div class="ban-win-rate">Win Rate: <strong>${randomRate}%</strong></div>
                    <button class="btn-main btn-blue" style="padding: 10px; font-size: 14px;" onclick="enterGame('${room}')">KẾT NỐI BÀN</button>
                `;
                grid.appendChild(banBox);
            });
        }

        function enterGame(roomName) {
            currentRoom = roomName;
            document.getElementById('current-table-name').innerText = `${currentSanh.name} - ${currentRoom}`;
            updateRoadmap();
            showScreen('screen-game');
        }

        function backToLobby() { showScreen('screen-lobby'); }
        function backToTable() { showScreen('screen-table'); }

        // --- GAME AI CORE LOGIC (EPIC V139) ---
        let pCards = 0, bCards = 0, pScore = -1, bScore = -1;
        let history = [];
        let lastPred = 'B';
        
        function setCards(side, val) {
            if(side === 'p') { pCards = val; document.getElementById('p-2').classList.toggle('active', val===2); document.getElementById('p-3').classList.toggle('active', val===3); }
            else { bCards = val; document.getElementById('b-2').classList.toggle('active', val===2); document.getElementById('b-3').classList.toggle('active', val===3); }
        }

        function createNumpad(side) {
            const container = document.getElementById(`numpad-${side}`);
            const nums = [1,2,3,4,5,6,7,8,9,0];
            nums.forEach(n => {
                let btn = document.createElement('button');
                btn.className = `num-btn num-${side}`;
                btn.innerText = n;
                btn.onclick = () => {
                    if(side === 'p') pScore = n; else bScore = n;
                    Array.from(container.children).forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                };
                container.appendChild(btn);
            });
        }
        createNumpad('p'); createNumpad('b');

        function resetUI() {
            pCards=0; bCards=0; pScore=-1; bScore=-1;
            document.querySelectorAll('.btn, .num-btn').forEach(b => b.classList.remove('active'));
        }

        // BIỂU ĐỒ ROADMAP
        let canvasHTML = `<canvas id="roadCanvas" width="280" height="120" style="background: rgba(0,0,0,0.5); border-radius: 10px; margin-top: 15px; width: 100%; border: 1px solid #1e293b; box-shadow: inset 0 0 20px rgba(0,0,0,1);"></canvas>`;
        document.querySelector('.game-container .bottom-panel').insertAdjacentHTML('beforeend', canvasHTML);

        function updateRoadmap() {
            let canvas = document.getElementById('roadCanvas');
            let ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;
            for(let i=0; i<11; i++) { ctx.beginPath(); ctx.moveTo(i*25.4 + 1, 0); ctx.lineTo(i*25.4 + 1, 120); ctx.stroke(); }
            for(let i=0; i<5; i++) { ctx.beginPath(); ctx.moveTo(0, i*24); ctx.lineTo(280, i*24); ctx.stroke(); }

            let grid = {}, c_idx = 0, r_idx = 0, last_val = null, last_coords = "0,0";
            history.forEach(h => {
                if (h === 'T') {
                    if (last_val === null) {
                        if (!grid["0,0"]) grid["0,0"] = {val: null, ties: 1};
                        else grid["0,0"].ties++;
                    } else grid[last_coords].ties++;
                } else {
                    if (last_val === null) {
                        let ties = grid["0,0"] ? grid["0,0"].ties : 0;
                        grid["0,0"] = {val: h, ties: ties};
                        last_coords = "0,0";
                    } else if (h !== last_val) {
                        c_idx++; r_idx = 0;
                        grid[`${c_idx},${r_idx}`] = {val: h, ties: 0};
                        last_coords = `${c_idx},${r_idx}`;
                    } else {
                        r_idx++;
                        grid[`${c_idx},${r_idx}`] = {val: h, ties: 0};
                        last_coords = `${c_idx},${r_idx}`;
                    }
                    last_val = h;
                }
            });

            let max_c = 0;
            Object.keys(grid).forEach(k => { let c = parseInt(k.split(',')[0]); if(c > max_c) max_c = c; });
            let start_c = Math.max(0, max_c - 10);

            Object.keys(grid).forEach(k => {
                let parts = k.split(',');
                let c = parseInt(parts[0]), r = parseInt(parts[1]);
                if(c < start_c || r > 4) return;
                
                let draw_c = c - start_c;
                let x = draw_c * 25.4 + 13;
                let y = r * 24 + 12;
                let data = grid[k];
                
                if(data.val) {
                    ctx.beginPath(); ctx.arc(x, y, 9, 0, 2 * Math.PI);
                    ctx.fillStyle = data.val === 'B' ? '#e11d48' : '#0ea5e9';
                    ctx.fill();
                    ctx.strokeStyle = data.val === 'B' ? '#ff7675' : '#74b9ff';
                    ctx.lineWidth = 1; ctx.stroke();
                }
                if(data.ties > 0) {
                    ctx.beginPath(); ctx.moveTo(x-9, y+9); ctx.lineTo(x+9, y-9);
                    ctx.strokeStyle = '#10b981'; ctx.lineWidth = 3; ctx.stroke();
                }
            });
        }

        // --- HÀM TÍNH TOÁN CÓ HIỆU ỨNG QUÉT ---
        function calculate() {
            if(pCards === 0 || bCards === 0) return alert("HỆ THỐNG LỖI: Chưa chọn số lá bài 2 cửa!");
            if(pScore === -1 || bScore === -1) return alert("HỆ THỐNG LỖI: Chưa chọn tổng điểm nút!");

            // 1. Kích hoạt hiệu ứng quét (Loading)
            let btn = document.getElementById('btnAnalyze');
            let resBox = document.getElementById('resultBox');
            let chatBox = document.getElementById('chatBox');
            
            btn.disabled = true;
            btn.innerText = "ĐANG PHÂN TÍCH...";
            
            resBox.innerHTML = '<div class="loader"></div>';
            resBox.style.backgroundColor = '#111';
            resBox.style.borderColor = '#fbbf24';
            resBox.style.boxShadow = '0 0 20px rgba(251, 191, 36, 0.4)';
            
            chatBox.innerHTML = '<span class="chat-scanning">[///] HỆ THỐNG ĐANG QUÉT DỮ LIỆU MÁY CHỦ...<br>[///] ĐO LƯỜNG ĐỘNG LƯỢNG BÀN CƯỢC...</span>';
            
            // 2. Chạy logic ngầm và delay 0.8s để show kết quả
            setTimeout(() => {
                let handNum = parseInt(document.getElementById('handNum').value);
                let tCards = pCards + bCards;
                let tScore = pScore + bScore;
                let winner = pScore === bScore ? 'T' : (bScore > pScore ? 'B' : 'P');
                
                history.push(winner);
                updateRoadmap();

                let lastDigit = handNum % 10;
                let modifier = 0, modMsg = "";
                let diff = Math.abs(bScore - pScore);

                if(winner === 'P' && pCards === 2 && bCards === 3) { modifier = 1; modMsg = "(P2>B3: +1)"; }
                else if(winner === 'B' && bCards === 2 && pCards === 3) { modifier = -1; modMsg = "(B2>P3: -1)"; }
                else if(pCards === bCards) {
                    if(diff > 2) { modifier = 1; modMsg = "(Chênh>2: +1)"; }
                    else if(diff < 2) { modifier = -1; modMsg = "(Chênh<2: -1)"; }
                    else { modMsg = "(Chênh=2: +0)"; }
                }

                let calcFinal = (lastDigit - tCards) + modifier;
                let bossPred = (calcFinal % 2 === 0 || calcFinal % 2 === -0) ? 'P' : 'B';
                let newPred = (tScore % 2 !== 0) ? 'B' : (winner === 'B' ? 'P' : 'B');

                let pred = 'B', msg = "", conf = 50;
                let mathStr = `LÕI MÃ HÓA: Đuôi ${lastDigit} - ${tCards}Lá ${modifier>=0?'+':''}${modifier} ${modMsg} = ${calcFinal}`;

                if(winner === 'T') {
                    pred = lastPred; conf = 85; 
                    msg = `⚠️ PHÁT HIỆN HÒA (TIE)\n------------------\nLuật bất thành văn: Không bẻ cầu sau Hòa.\n=> LỆNH XUẤT: Giữ nguyên cửa ${pred}!`;
                } else if(bossPred === newPred) {
                    pred = bossPred; conf = 78; 
                    msg = `⚡ ĐỒNG BỘ HYBRID THÀNH CÔNG ⚡\n------------------\n${mathStr}\nLõi Độc Quyền và Cảm Biến Bóng Nút ĐỒNG THUẬN.\n=> LỆNH XUẤT: Tự tin vã MẠNH tay vào [ ${pred==='P'?'CON (PLAYER)':'CÁI (BANKER)'} ]!`;
                } else {
                    if(tCards === 6) {
                        pred = bossPred; conf = 62; 
                        msg = `⚠️ PHÁT HIỆN CẦU PHÂN KỲ (6 LÁ)\n------------------\n${mathStr}\nÁp lực giằng co mạnh. Ưu tiên Lõi Mã Hóa Độc Quyền.\n=> LỆNH XUẤT: Đánh vừa tay [ ${pred==='P'?'CON':'CÁI'} ].`;
                    } else if(diff >= 5) {
                        pred = winner; conf = 60; 
                        msg = `⚠️ CẢNH BÁO: LỰC ÉP QUÁ LỚN\n------------------\nChênh lệch điểm số đạt mức cực đoan (${diff} nút).\n=> LỆNH XUẤT: Nương theo động lượng, bắt [ ${pred==='P'?'CON':'CÁI'} ].`;
                    } else {
                        pred = bossPred; conf = 51; 
                        msg = `⚠️ CẢNH BÁO: CẦU NHIỄU SÓNG\n------------------\nTín hiệu xung đột. Kích hoạt Lõi Mã Hóa an toàn.\n=> LỆNH XUẤT: Đi lệnh NHỎ dò đường vào [ ${pred==='P'?'CON':'CÁI'} ].`;
                    }
                }

                lastPred = pred;
                
                // Show Result
                resBox.innerHTML = pred;
                resBox.style.backgroundColor = pred === 'B' ? '#be123c' : '#0284c7';
                resBox.style.borderColor = pred === 'B' ? '#fb7185' : '#38bdf8';
                resBox.style.boxShadow = pred === 'B' ? 'var(--neon-red-glow)' : 'var(--neon-blue-glow)';
                
                document.getElementById('chatBox').innerText = msg;
                
                let rateBox = document.getElementById('winRate');
                rateBox.innerText = `TỈ LỆ: ${conf}%`;
                rateBox.style.color = conf >= 70 ? '#10b981' : (conf >= 60 ? '#fbbf24' : '#ef4444');

                document.getElementById('handNum').value = handNum + 1;
                
                btn.disabled = false;
                btn.innerText = "🚀 KÍCH HOẠT QUÉT AI";
                resetUI();
                
            }, 800); // 0.8 giây delay hoành tráng
        }
    </script>
</body>
</html>
